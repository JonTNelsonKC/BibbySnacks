name = "bibby-snacks"
compatibility_date = "2026-07-09"
main = "src/worker.js"

[assets]
directory = "."
binding = "ASSETS"
run_worker_first = ["/api/*"]

[vars]
# Optional shared passcode. Prefer setting it as a Workers secret instead of here:
# wrangler --config wrangler.worker.toml secret put ORDER_PIN
#
# Webhook notification:
# WEBHOOK_URL = "https://ntfy.sh/your-hard-to-guess-topic"
# WEBHOOK_KIND = "ntfy" # generic, discord, slack, or ntfy
