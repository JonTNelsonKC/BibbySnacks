# wrangler.toml
name = 'bibbysnacks'
compatibility_date = "2026-07-09"
main = "src/worker.js"

[assets]
directory = "."
binding = "ASSETS"
run_worker_first = ["/api/*"]

[vars]
# Optional shared passcode. Prefer setting it as a Worker secret instead of here:
# wrangler secret put ORDER_PIN
#
# Webhook notification:
# WEBHOOK_URL = "https://ntfy.sh/your-hard-to-guess-topic"
# WEBHOOK_KIND = "ntfy" # generic, discord, slack, or ntfy
